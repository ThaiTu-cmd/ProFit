<!DOCTYPE html>
<html>
<head>
    <title>VNPay Test v2</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
</head>
<body>
    <h1>VNPay Test - Version 2</h1>
    <p><strong>Phiên bản này KHÔNG encode returnUrl</strong></p>
    <button onclick="generateURL()">Generate URL</button>
    <pre id="result">Chưa tạo</pre>
    <br>
    <a id="paymentLink" href="#" target="_blank" style="display:none;padding:15px;background:#4CAF50;color:white;text-decoration:none;border-radius:5px;">CLICK ĐỂ TEST</a>

    <script>
        function hmacSHA512(data, key) {
            return CryptoJS.HmacSHA512(data, key).toString(Crypto-js.enc.Hex);
        }

        function pad(n) { return n < 10 ? '0' + n : n; }

        function getDateTime() {
            const d = new Date();
            return d.getFullYear() + pad(d.getMonth()+1) + pad(d.getDate()) + pad(d.getHours()) + pad(d.getMinutes()) + pad(d.getSeconds());
        }

        function generateURL() {
            const tmnCode = "SY273SZH";
            const hashSecret = "SFP53JL1Z5AS4O5WFIEBMEARJAEMDTBT";
            const paymentUrl = "https://sandbox.vnpayment.vn/paymentv2/vpcpay.html";
            const returnUrl = "http://localhost:8080/ProFitSuppsDB/api/v1/payment/vnpay-return";
            const createDate = getDateTime();
            
            // Tính expireDate +15 phút
            const d = new Date();
            d.setMinutes(d.getMinutes() + 15);
            const expireDate = d.getFullYear() + pad(d.getMonth()+1) + pad(d.getDate()) + pad(d.getHours()) + pad(d.getMinutes()) + pad(d.getSeconds());

            // Params - KHÔNG encode gì cả
            const params = {};
            params["vnp_Version"] = "2.1.0";
            params["vnp_Command"] = "pay";
            params["vnp_TmnCode"] = tmnCode;
            params["vnp_Amount"] = "1000000";
            params["vnp_CurrCode"] = "VND";
            params["vnp_TxnRef"] = "TEST" + Date.now();
            params["vnp_OrderType"] = "other";
            params["vnp_Locale"] = "vn";
            params["vnp_ReturnUrl"] = returnUrl;  // KHÔNG encode
            params["vnp_IpAddr"] = "127.0.0.1";
            params["vnp_CreateDate"] = createDate;
            params["vnp_ExpireDate"] = expireDate;

            // Sort keys
            const keys = Object.keys(params).sort();
            
            // Build hash data
            let hashData = "";
            let query = "";
            for (let i = 0; i < keys.length; i++) {
                const k = keys[i];
                const v = params[k];
                if (i > 0) {
                    hashData += "&";
                    query += "&";
                }
                hashData += k + "=" + v;
                query += k + "=" + encodeURIComponent(v);
            }

            const hash = hmacSHA512(hashData, hashSecret);
            const url = paymentUrl + "?" + query + "&vnp_SecureHash=" + hash;

            document.getElementById("result").innerHTML = 
                "Hash Data:\n" + hashData + "\n\n" +
                "Hash:\n" + hash + "\n\n" +
                "URL:\n" + url;
            
            const link = document.getElementById("paymentLink");
            link.href = url;
            link.style.display = "inline-block";
        }

        window.onload = generateURL;
    </script>
</body>
</html>
