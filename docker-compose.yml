name: profit

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: profit-backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://host.docker.internal:3306/ProFitSuppsDB?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Ho_Chi_Minh&connectionCharacterSet=UTF-8
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      APP_FRONTEND_BASE_URL: http://localhost:5173
      JWT_SECRET: ProFitSecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLong2024
      JWT_EXPIRATION_MS: 86400000
      JWT_REMEMBER_EXPIRATION_MS: 604800000
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8080/ProFitSuppsDB
        VITE_CHAT_API_URL: http://localhost:8000
    container_name: profit-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

  pgvector:
    image: pgvector/pgvector:pg16
    container_name: pgvector-container
    profiles: ["chatbot"]
    environment:
      POSTGRES_USER: langchain
      POSTGRES_PASSWORD: langchain
      POSTGRES_DB: langchain
    ports:
      - "6024:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langchain -d langchain"]
      interval: 5s
      timeout: 5s
      retries: 20

  chatbot:
    build:
      context: ./chatbot
      dockerfile: Dockerfile
    container_name: profit-chatbot
    restart: unless-stopped
    profiles: ["chatbot"]
    depends_on:
      pgvector:
        condition: service_healthy
    environment:
      PGVECTOR_CONNECTION: postgresql+psycopg://langchain:langchain@pgvector:5432/langchain
      PGVECTOR_COLLECTION: my_docs
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-gpt-5-nano}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      ALLOW_DEMO_RETRIEVER: ${ALLOW_DEMO_RETRIEVER:-false}
    ports:
      - "8000:8000"

volumes:
  pgvector_data:
