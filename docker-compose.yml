name: profit

services:
  mysql:
    image: mysql:8.0
    container_name: profit-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ProFitSuppsDB
      MYSQL_ROOT_HOST: '%'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 30
    networks:
      - profit-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: profit-backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/ProFitSuppsDB?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Ho_Chi_Minh&connectionCharacterSet=UTF-8
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      FRONTEND_BASE_URL: http://localhost:5173
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - profit-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8080/ProFitSuppsDB
        VITE_CHAT_API_URL: http://localhost:8000
    container_name: profit-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"
    networks:
      - profit-net

  pgvector:
    image: pgvector/pgvector:pg16
    container_name: pgvector-container
    restart: unless-stopped
    environment:
      POSTGRES_USER: langchain
      POSTGRES_PASSWORD: langchain
      POSTGRES_DB: langchain
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langchain -d langchain"]
      interval: 5s
      timeout: 5s
      retries: 30
    networks:
      - profit-net

  chatbot:
    build:
      context: ./chatbot
      dockerfile: Dockerfile
    container_name: profit-chatbot
    restart: unless-stopped
    env_file:
      - ./chatbot/.env
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
      pgvector:
        condition: service_healthy
    networks:
      - profit-net

volumes:
  pgvector_data:
  mysql_data:

networks:
  profit-net:
    driver: bridge
