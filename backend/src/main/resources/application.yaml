server:
  port: 8080
  servlet:
    context-path: /ProFitSuppsDB

spring:
  profiles:
    include: local
  datasource:
    url: "jdbc:mysql://localhost:3306/ProFitSuppsDB?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Ho_Chi_Minh&connectionCharacterSet=UTF-8"
    username: root
    password: password
  sql:
    init:
      mode: never
      continue-on-error: true
  jpa:
    defer-datasource-initialization: false
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        jdbc:
          batch_size: 25
        connection:
          characterEncoding: utf8
        format_sql: true
  jackson:
    deserialization:
      fail-on-unknown-properties: false
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: YOUR_GOOGLE_CLIENT_ID
            client-secret: YOUR_GOOGLE_CLIENT_SECRET
            scope: openid,profile,email
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://openidconnect.googleapis.com/openid-connect/v1/userinfo
            user-name-attribute: "email"

app:
  jwt:
    secret: "ProFitJwtSecretKeyMustBeAtLeastSixtyFourCharactersLongForHS512Secure"
    expiration-ms: 86400000
    remember-expiration-ms: 604800000
  bootstrap:
    admin:
      enabled: true
      full-name: Administrator
      email: admin@profit.com
      phone: "0123456789"
      password: Admin@123
  vnpay:
    tmn-code: SY273SZH
    hash-secret: SFP53JL1Z5AS4O5WFIEBMEARJAEMDTBT
    payment-url: https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
    return-url: http://localhost:8080/ProFitSuppsDB/api/v1/payment/vnpay-return
    ipn-url: http://localhost:8080/ProFitSuppsDB/api/v1/payment/vnpay-ipn
  frontend:
    base-url: "http://localhost:5173"
