server:
  port: 8080
  servlet:
    context-path: /ProFitSuppsDB

spring:
  profiles:
    include: local
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/ProFitSuppsDB?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Ho_Chi_Minh&connectionCharacterSet=UTF-8}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
  sql:
    init:
      mode: never
      continue-on-error: true
  jpa:
    defer-datasource-initialization: false
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        jdbc:
          batch_size: 25
        connection:
          characterEncoding: utf8
        format_sql: true
  jackson:
    deserialization:
      fail-on-unknown-properties: false

app:
  jwt:
    secret: ${JWT_SECRET:ProFitSecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLong2024}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
    remember-expiration-ms: ${JWT_REMEMBER_EXPIRATION_MS:604800000}
  bootstrap:
    admin:
      enabled: true
      full-name: Administrator
      email: admin@profit.com
      phone: "0123456789"
      password: Admin@123
  vnpay:
    tmn-code: ${VNPAY_TMN_CODE:}
    hash-secret: ${VNPAY_HASH_SECRET:}
    payment-url: https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
    return-url: ${VNPAY_RETURN_URL:http://localhost:8080/ProFitSuppsDB/api/v1/payment/vnpay-return}
    ipn-url: ${VNPAY_IPN_URL:http://localhost:8080/ProFitSuppsDB/api/v1/payment/vnpay-ipn}
  frontend:
    base-url: "http://localhost:5173"
